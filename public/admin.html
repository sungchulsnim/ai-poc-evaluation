<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI POC 평가 관리자</title>
    <link rel="stylesheet" href="/app.css">
  </head>
  <body class="admin-body">
    <header class="topbar">
      <div>
        <p class="eyebrow">AI POC Workshop</p>
        <h1>평가 관리자</h1>
      </div>
      <div class="top-actions">
        <button class="ghost-button" id="refreshButton" type="button">새로고침</button>
        <button class="ghost-button" id="logoutButton" type="button">로그아웃</button>
      </div>
    </header>

    <main class="admin-main">
      <section class="summary-grid" id="summaryGrid" aria-live="polite"></section>

      <section class="panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Ranking</p>
            <h2>실시간 결과</h2>
          </div>
          <a class="primary-button compact" href="/api/export.csv">CSV 다운로드</a>
        </div>
        <div class="table-wrap">
          <table class="result-table">
            <thead id="resultHead"></thead>
            <tbody id="resultBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Settings</p>
            <h2>과제 및 제외 설정</h2>
          </div>
          <button class="primary-button compact" id="saveSettingsButton" type="button">설정 저장</button>
        </div>

        <div class="settings-grid">
          <div class="settings-box">
            <div class="mini-heading">
              <h3>전체 과제 리스트</h3>
              <button class="ghost-button compact" id="addProjectButton" type="button">과제 추가</button>
            </div>
            <div class="project-editor-list" id="projectEditorList"></div>
          </div>

          <div class="settings-box">
            <div class="mini-heading">
              <h3>그룹별 제외 과제</h3>
              <span class="muted">체크한 과제는 해당 그룹 링크에서 제외됩니다.</span>
            </div>
            <div class="group-settings-list" id="groupSettingsList"></div>
          </div>
        </div>
        <p class="form-message" id="settingsMessage"></p>
      </section>

      <section class="panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Links</p>
            <h2>그룹별 투표 링크</h2>
          </div>
        </div>
        <div class="link-list" id="linkList"></div>
      </section>

      <section class="panel danger-panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Reset</p>
            <h2>평가 정보 초기화</h2>
          </div>
          <button class="danger-button compact" id="resetVotesButton" type="button">처음부터 다시시작</button>
        </div>
        <p class="muted">제출된 평가 점수와 중복 투표 기록만 삭제됩니다. 과제 리스트와 그룹별 제외 설정은 유지됩니다.</p>
        <p class="form-message" id="resetMessage"></p>
      </section>
    </main>

    <script src="/admin.js" type="module"></script>
  </body>
</html>
